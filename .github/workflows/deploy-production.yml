name: Deploy Frontend Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
      HOST_PORT: ${{ secrets.HOST_PORT }}
      CONTAINER_PORT: ${{ secrets.CONTAINER_PORT }}
      IMAGE_NAME: payment-kita-frontend
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$(echo "${{ secrets.LOGIN_VPS }}" | cut -d@ -f2)" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          REMOTE_APP_DIR="${REMOTE_APP_DIR:-~/app/payment-kita.frontend}"
          CONTAINER_NAME="${CONTAINER_NAME:-payment-kita.frontend.container}"
          HOST_PORT="${HOST_PORT:-3000}"
          CONTAINER_PORT="${CONTAINER_PORT:-3000}"

          ssh "${{ secrets.LOGIN_VPS }}" <<EOF
            set -e
            cd "$REMOTE_APP_DIR"

            git fetch origin main
            git checkout main
            git pull origin main

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            docker build -t "$IMAGE_NAME:latest" .

            if [ ! -f .env ]; then
              echo "ERROR: $REMOTE_APP_DIR/.env not found"
              exit 1
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$HOST_PORT:$CONTAINER_PORT" \
              --env-file "$REMOTE_APP_DIR/.env" \
              "$IMAGE_NAME:latest"

            docker inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{println .}}{{end}}' | egrep 'BACKEND_URL|NEXT_PUBLIC_BACKEND_URL|NEXT_PUBLIC_API_URL|NODE_ENV' || true

            docker image prune -f
            sudo sync; echo 3 > /proc/sys/vm/drop_caches
          EOF
